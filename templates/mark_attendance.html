<!DOCTYPE html>
<html>
<head>
    <title>Mark Attendance</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="p-4">

<h2>Mark Attendance</h2>

<label>Subject:</label>
<select id="subject" class="form-control w-25">
    <option value="Math">Math</option>
    <option value="OS">OS</option>
    <option value="DBMS">DBMS</option>
    <option value="Python">Python</option>
</select>

<br>

<label>Session:</label>
<select id="session" class="form-control w-25">
    <option value="1">Lecture 1</option>
    <option value="2">Lecture 2</option>
    <option value="3">Lecture 3</option>
    <option value="4">Lecture 4</option>
    <option value="5">Lecture 5</option>
    <option value="6">Sign Out</option>
</select>

<br><br>

<!-- Camera Box -->
<div>
    <video id="video" width="400" height="300" autoplay style="border:2px solid black;"></video>
</div>

<br>

<button onclick="capture()" class="btn btn-primary">Mark Attendance</button>

<div id="resultBox" class="mt-3"></div>

<canvas id="canvas" width="400" height="300" style="display:none;"></canvas>

<script>
    const video = document.getElementById('video');

    navigator.mediaDevices.getUserMedia({ video: true })
        .then(function(stream) {
            video.srcObject = stream;
        });

    let frames = [];

    function capture() {
        frames = [];
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let count = 0;

        let interval = setInterval(() => {
            ctx.drawImage(video, 0, 0, 400, 300);
            frames.push(canvas.toDataURL('image/png'));
            count++;

            if (count == 10) {
                clearInterval(interval);

                const subject = document.getElementById('subject').value;
                const session = document.getElementById('session').value;

                fetch('/mark_attendance', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        frames: frames,
                        subject: subject,
                        session: session
                    })
                })
                .then(res => res.text())
                .then(data => {
                    const resultBox = document.getElementById("resultBox");

                    if (data.includes("Attendance Marked")) {
                        resultBox.innerHTML = `<div class="alert alert-success">${data}</div>`;
                    } 
                    else if (data.includes("already marked")) {
                        resultBox.innerHTML = `<div class="alert alert-warning">${data}</div>`;
                    }
                    else {
                        resultBox.innerHTML = `<div class="alert alert-danger">${data}</div>`;
                    }
                });
            }

        }, 200);
    }
</script>

</body>
</html>
