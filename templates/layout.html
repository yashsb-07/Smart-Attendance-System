<!DOCTYPE html>
<html>
<head>
    <title>Smart Attendance System</title>

    <link rel="stylesheet" href="/static/css/style.css">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <meta name="viewport" content="width=device-width, initial-scale=1">
</head>

<body>

<!-- Sidebar -->
<div class="sidebar">
    <h4>Smart Attendance</h4>

    <a href="/dashboard"><i class="bi bi-speedometer2"></i> Dashboard</a>
    <a href="/register_student"><i class="bi bi-person-plus"></i> Register Student</a>
    <a href="/mark_attendance"><i class="bi bi-camera"></i> Mark Attendance</a>
    <a href="/attendance_report"><i class="bi bi-bar-chart"></i> Attendance Report</a>
    <a href="/search_student"><i class="bi bi-search"></i> Search Student</a>
    <a href="/logout"><i class="bi bi-box-arrow-right"></i> Logout</a>
</div>

<!-- Main Content -->
<div class="content">

    <!-- Top Bar -->
    <div class="top-bar">
        <button class="toggle-btn" onclick="toggleSidebar()">☰</button>
        <h2 class="page-title">{% block title %}{% endblock %}</h2>
        <button class="mode-btn" onclick="toggleMode()" id="modeIcon">🌙</button>
    </div>

    {% block content %}
    {% endblock %}

</div>

<!-- Footer -->
<footer class="footer">
    Smart Attendance System © 2026
</footer>

<!-- Scripts -->
<script>
    // Sidebar Toggle
    function toggleSidebar() {
        document.querySelector(".sidebar").classList.toggle("collapsed");
        document.querySelector(".content").classList.toggle("collapsed");
        document.querySelector(".footer").classList.toggle("collapsed");
    }

    // Dark Mode
    function toggleMode() {
        document.body.classList.toggle("dark-mode");

        let icon = document.getElementById("modeIcon");

        if (document.body.classList.contains("dark-mode")) {
            localStorage.setItem("theme", "dark");
            icon.innerHTML = "☀️";
        } else {
            localStorage.setItem("theme", "light");
            icon.innerHTML = "🌙";
        }
    }

    // Load Theme
    window.onload = function() {
        let icon = document.getElementById("modeIcon");

        if (localStorage.getItem("theme") === "dark") {
            document.body.classList.add("dark-mode");
            icon.innerHTML = "☀️";
        }
    }
</script>

</body>
</html>
