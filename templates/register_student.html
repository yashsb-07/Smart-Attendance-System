<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Face Registration</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- External CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/register_student.css') }}">
</head>
<body>

<!-- Particle Background -->
<canvas id="particles"></canvas>

<!-- Header -->
<div class="header">
    <h2>AI FACE REGISTRATION SYSTEM</h2>
</div>

<!-- Main Container -->
<div class="container main-container">
    <div class="row g-4 align-items-stretch">

        <!-- Left: Registration Form -->
        <div class="col-lg-5">
            <div class="card form-card h-100">
                <div class="card-body">
                    <h4 class="card-title text-center mb-4">Student Registration</h4>

                    {% if message %}
                    <div class="success-message">{{ message }}</div>
                    {% endif %}

                    {% if error %}
                    <div class="error-message">{{ error }}</div>
                    {% endif %}

                    <form method="POST" action="/register_student" id="registerForm">
                        <input type="text" name="name" class="form-control mb-3" placeholder="Full Name" required>
                        <input type="text" name="roll_number" class="form-control mb-3" placeholder="Roll Number" required>

                        <select name="department" class="form-control mb-3" required>
                            <option value="">Select Department</option>
                            <option>Computer Engineering</option>
                            <option>Information Technology</option>
                            <option>ENTC</option>
                            <option>Mechanical</option>
                            <option>Civil</option>
                        </select>

                        <select name="class" class="form-control mb-3" required>
                            <option value="">Select Class</option>
                            <option>FY</option>
                            <option>SY</option>
                            <option>TY</option>
                            <option>BE</option>
                        </select>

                        <select name="semester" class="form-control mb-3" required>
                            <option value="">Select Semester</option>
                            <option>1</option><option>2</option><option>3</option><option>4</option>
                            <option>5</option><option>6</option><option>7</option><option>8</option>
                        </select>

                        <input type="hidden" name="image_data" id="image_data">

                        <button type="submit" class="btn register-btn w-100">
                            Register Student
                        </button>
                    </form>

                    <!-- Loader -->
                    <div id="loader" class="loader mt-4" style="display:none;"></div>
                </div>
            </div>
        </div>

        <!-- Right: Camera Section -->
        <div class="col-lg-7">
            <div class="card camera-card h-100 text-center">
                <div class="card-body">
                    <h4 class="card-title mb-3">AI Face Capture</h4>

                    <div class="camera-box">
                        <video id="video" autoplay muted></video>
                        <canvas id="faceCanvas"></canvas>
                        <div class="scan-line"></div>
                        <div class="radar"></div>
                    </div>

                    <p id="faceStatus" class="face-status mt-3">No Face Detected</p>
                    <p id="instructionText" class="instruction-text">Align your face</p>

                    <!-- Progress Ring -->
                    <div class="progress-ring mt-3">
                        <svg width="140" height="140">
                            <circle cx="70" cy="70" r="60" stroke="#334155" stroke-width="8" fill="none"/>
                            <circle id="progressCircle" cx="70" cy="70" r="60"
                                stroke="#22c55e" stroke-width="8" fill="none"
                                stroke-dasharray="377"
                                stroke-dashoffset="377"/>
                        </svg>
                        <p id="progressText">0%</p>
                    </div>

                    <canvas id="canvas" style="display:none;"></canvas>
                </div>
            </div>
        </div>

    </div>
</div>

<!-- Success Animation Overlay -->
<div id="successAnimation" class="success-overlay" style="display:none;">
    <div class="success-box">
        <div class="checkmark-circle">
            <div class="checkmark"></div>
        </div>
        <p>Registration Successful</p>
    </div>
</div>

<!-- Footer -->
<div class="footer">
    Smart Attendance System © 2026
</div>

<!-- Sounds -->
<audio id="successSound" src="{{ url_for('static', filename='sounds/success.mp3') }}"></audio>
<audio id="errorSound" src="{{ url_for('static', filename='sounds/error.mp3') }}"></audio>
<audio id="captureSound" src="{{ url_for('static', filename='sounds/capture.mp3') }}"></audio>

<!-- face-api -->
<script defer src="https://unpkg.com/face-api.js@0.22.2/dist/face-api.min.js"></script>

<!-- External JS -->
<script defer src="{{ url_for('static', filename='js/register_student.js') }}"></script>

</body>
</html>
